{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white ">
            <h4>Update student</h4>
        </div>

        <div class="card-body">
           <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {% if student.image %}
    <div class="mb-3">
        <label class="form-label">Current image</label>
        <img src="{{ student.image.url }}" alt="current student image" width="150">
    </div>
    {% endif %}

    <div class="mb-3">
        <label class="form-label">Change image</label>
        <input type="file" name="image" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Student Name</label>
        <input type="text" name="name" class="form-control" value="{{ student.name }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Course</label>
        <input type="text" name="course" class="form-control" value="{{ student.course }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" value="{{ student.age }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ student.email }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="text" name="date" class="form-control" value="{{ student.date }}">
    </div>

    <button type="submit" class="btn btn-primary">Update student</button>
    <a href="{% url 'index' %}" class="btn btn-danger">Cancel</a>
</form>
        </div>
    </div>
</div>

</body>
</html>
